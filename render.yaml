# Render Static Site — https://dashboard.render.com
# Connect repo: https://github.com/anil94developer/jctrade-web
services:
  - type: web
    name: jctrade-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: EXPO_PUBLIC_API_URL
        sync: false
      - key: EXPO_PUBLIC_GOOGLE_CLIENT_ID
        sync: false
    # Google Sign-In popup uses postMessage; default COOP breaks it without this.
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin-allow-popups
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: unsafe-none
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
